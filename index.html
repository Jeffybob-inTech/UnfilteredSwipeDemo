<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Swipe Vote</title>

<style>
body {
  margin: 0;
  background: #0a0a0f;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: white;
}

.container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* Faces */
.face {
  position: absolute;
  width: 100%;
  height: 50%;
  overflow: hidden;
  will-change: transform;
  transition: transform 0.25s cubic-bezier(.22,1,.36,1), opacity 0.25s;
}

.top { top: 0; }
.bottom { bottom: 0; }

.face img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}

.name {
  position: absolute;
  bottom: 14px;
  left: 18px;
  font-size: 20px;
  font-weight: 600;
}

/* Prompt */
.prompt {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 100%;
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  background: linear-gradient(90deg, #8b5cff, #4da6ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Glow */
.active {
  box-shadow: 0 0 60px rgba(139,92,255,0.8);
  transform: scale(1.06);
}
</style>
</head>

<body>

<div class="container">

  <div class="face top" id="topFace">
    <img id="topImg" src="https://picsum.photos/600/400?1">
    <div class="name" id="topName">Jake</div>
  </div>

  <div class="prompt">Most Likely To Survive Zombie Apocalypse</div>

  <div class="face bottom" id="bottomFace">
    <img id="bottomImg" src="https://picsum.photos/600/400?2">
    <div class="name" id="bottomName">Sam</div>
  </div>

</div>

<script>
const topFace = document.getElementById("topFace");
const bottomFace = document.getElementById("bottomFace");

let startY = 0;
let currentY = 0;
let dragging = false;
let velocity = 0;
let lastTime = 0;
let locked = null;

// ===== START =====
window.addEventListener("mousedown", start);
window.addEventListener("touchstart", start);

function start(e) {
  const p = e.touches ? e.touches[0] : e;
  startY = p.clientY;
  currentY = startY;
  dragging = true;
  lastTime = performance.now();
  locked = null;
}

// ===== MOVE =====
window.addEventListener("mousemove", move);
window.addEventListener("touchmove", move);

function move(e) {
  if (!dragging) return;

  const p = e.touches ? e.touches[0] : e;
  const now = performance.now();

  const dy = p.clientY - startY;

  velocity = (p.clientY - currentY) / (now - lastTime);
  currentY = p.clientY;
  lastTime = now;

  const abs = Math.abs(dy);

  // Ease resistance (Apple feel)
  const resistance = dy * (1 / (1 + abs / 300));

  // Lock decision early
  if (!locked && abs > 30) {
    locked = dy < 0 ? "top" : "bottom";
  }

  highlight(locked);

  if (locked === "top") {
    topFace.style.transform = `translateY(${resistance * 0.6}px) scale(1.06)`;
  }

  if (locked === "bottom") {
    bottomFace.style.transform = `translateY(${resistance * 0.6}px) scale(1.06)`;
  }
}

// ===== END =====
window.addEventListener("mouseup", end);
window.addEventListener("touchend", end);

function end() {
  if (!dragging) return;
  dragging = false;

  const dy = currentY - startY;

  const commitDistance = 120;
  const commitVelocity = 0.6;

  if (locked === "top" && (dy < -commitDistance || velocity < -commitVelocity)) {
    commit("top");
  } else if (locked === "bottom" && (dy > commitDistance || velocity > commitVelocity)) {
    commit("bottom");
  } else {
    reset();
  }
}

// ===== COMMIT =====
function commit(target) {
  const el = target === "top" ? topFace : bottomFace;

  const direction = target === "top" ? -1 : 1;

  el.style.transform = `translateY(${direction * 900}px) scale(1.1)`;
  el.style.opacity = "0";

  console.log("VOTED:", target);

  setTimeout(() => {
    reset();
    next();
  }, 250);
}

// ===== RESET =====
function reset() {
  [topFace, bottomFace].forEach(el => {
    el.style.transform = "translateY(0) scale(1)";
    el.style.opacity = "1";
    el.classList.remove("active");
  });
}

// ===== HIGHLIGHT =====
function highlight(target) {
  topFace.classList.remove("active");
  bottomFace.classList.remove("active");

  if (target === "top") topFace.classList.add("active");
  if (target === "bottom") bottomFace.classList.add("active");
}

// ===== NEXT =====
function next() {
  const names = [["Alex","Chris"],["Jordan","Taylor"],["Ryan","Casey"]];
  const i = Math.floor(Math.random() * names.length);

  topName.innerText = names[i][0];
  bottomName.innerText = names[i][1];

  topImg.src = `https://picsum.photos/600/400?${Math.random()}`;
  bottomImg.src = `https://picsum.photos/600/400?${Math.random()}`;
}
</script>

</body>
</html>

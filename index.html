<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Swipe Vote</title>

<style>
body {
  margin: 0;
  background: #0a0a0f;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

.container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* Faces */
.face {
  position: absolute;
  width: 100%;
  height: 50%;
  overflow: hidden;
  transition: transform 0.25s ease, opacity 0.25s ease;
}

.top { top: 0; }
.bottom { bottom: 0; }

.face img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}

.name {
  position: absolute;
  bottom: 12px;
  left: 16px;
  font-size: 20px;
  font-weight: bold;
}

/* Prompt */
.prompt {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 100%;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  background: linear-gradient(90deg, #8b5cff, #4da6ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Highlight */
.highlight {
  box-shadow: 0 0 40px rgba(139,92,255,0.7);
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">

  <div class="face top" id="topFace">
    <img id="topImg" src="https://picsum.photos/600/400?1">
    <div class="name" id="topName">Jake</div>
  </div>

  <div class="prompt">Most Likely To Survive Zombie Apocalypse</div>

  <div class="face bottom" id="bottomFace">
    <img id="bottomImg" src="https://picsum.photos/600/400?2">
    <div class="name" id="bottomName">Sam</div>
  </div>

</div>

<script>
const topFace = document.getElementById("topFace");
const bottomFace = document.getElementById("bottomFace");

let startY = 0;
let currentY = 0;
let dragging = false;
let velocity = 0;
let lastTime = 0;

// ===== START =====
window.addEventListener("mousedown", start);
window.addEventListener("touchstart", start);

function start(e) {
  const p = e.touches ? e.touches[0] : e;
  startY = p.clientY;
  currentY = startY;
  dragging = true;
  lastTime = Date.now();
}

// ===== MOVE =====
window.addEventListener("mousemove", move);
window.addEventListener("touchmove", move);

function move(e) {
  if (!dragging) return;

  const p = e.touches ? e.touches[0] : e;
  const now = Date.now();

  const dy = p.clientY - startY;
  velocity = (p.clientY - currentY) / (now - lastTime);

  currentY = p.clientY;
  lastTime = now;

  // Visual feedback
  if (dy < 0) {
    topFace.style.transform = `translateY(${dy * 0.2}px) scale(1.05)`;
    topFace.classList.add("highlight");
    bottomFace.classList.remove("highlight");
  } else {
    bottomFace.style.transform = `translateY(${dy * 0.2}px) scale(1.05)`;
    bottomFace.classList.add("highlight");
    topFace.classList.remove("highlight");
  }
}

// ===== END =====
window.addEventListener("mouseup", end);
window.addEventListener("touchend", end);

function end(e) {
  if (!dragging) return;
  dragging = false;

  const dy = currentY - startY;

  const threshold = 80;
  const velocityThreshold = 0.5;

  if (dy < -threshold || velocity < -velocityThreshold) {
    vote("top");
  } else if (dy > threshold || velocity > velocityThreshold) {
    vote("bottom");
  } else {
    reset();
  }
}

// ===== VOTE =====
function vote(target) {
  const el = target === "top" ? topFace : bottomFace;

  el.style.transition = "transform 0.25s ease, opacity 0.25s ease";
  el.style.transform = `translateY(${target === "top" ? -800 : 800}px) scale(1.1)`;
  el.style.opacity = "0";

  console.log("VOTED:", target);

  setTimeout(() => {
    reset();
    next();
  }, 250);
}

// ===== RESET =====
function reset() {
  [topFace, bottomFace].forEach(el => {
    el.style.transition = "transform 0.25s ease, opacity 0.25s ease";
    el.style.transform = "translateY(0) scale(1)";
    el.style.opacity = "1";
    el.classList.remove("highlight");
  });
}

// ===== NEXT =====
function next() {
  const names = [["Alex","Chris"],["Jordan","Taylor"],["Ryan","Casey"]];
  const i = Math.floor(Math.random() * names.length);

  document.getElementById("topName").innerText = names[i][0];
  document.getElementById("bottomName").innerText = names[i][1];

  document.getElementById("topImg").src = `https://picsum.photos/600/400?${Math.random()}`;
  document.getElementById("bottomImg").src = `https://picsum.photos/600/400?${Math.random()}`;
}
</script>

</body>
</html>

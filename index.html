<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Swipe</title>

<style>
body {
  margin: 0;
  background: #0a0a0f;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* Faces */
.face {
  position: absolute;
  width: 100%;
  height: 50%;
  overflow: hidden;
}

.top { top: 0; }
.bottom { bottom: 0; }

.face img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}

/* Drag layer */
.drag {
  position: absolute;
  width: 100%;
  height: 50%;
  pointer-events: none;
  will-change: transform;
}
</style>
</head>

<body>

<div class="container">
  <div class="face top" id="topFace">
    <img src="https://picsum.photos/600/400?1">
  </div>

  <div class="face bottom" id="bottomFace">
    <img src="https://picsum.photos/600/400?2">
  </div>

  <div class="drag" id="drag"></div>
</div>

<script>
const drag = document.getElementById("drag");
const topFace = document.getElementById("topFace");
const bottomFace = document.getElementById("bottomFace");

let dragging = false;
let startX = 0;
let currentX = 0;
let active = null;
const img1 = new Image();
const img2 = new Image();
const pairs = [
    ["https://picsum.photos/600/400?1", "https://picsum.photos/600/400?2"],
    ["https://picsum.photos/600/400?3", "https://picsum.photos/600/400?4"],
    ["https://picsum.photos/600/400?5", "https://picsum.photos/600/400?6"]
  ];
let i = 0;
img1.src = pairs[i][0];
img2.src = pairs[i][1];

img1.onload = () => {
  topFace.querySelector("img").src = img1.src;
  bottomFace.querySelector("img").src = img2.src;
};
// ===== START =====
window.addEventListener("mousedown", start);
window.addEventListener("touchstart", start);

function start(e){
  const p = e.touches ? e.touches[0] : e;
  dragging = true;
  startX = currentX = p.clientX;
  active = null;
}

// ===== MOVE =====
window.addEventListener("mousemove", move);
window.addEventListener("touchmove", move);
function getMidX() {
  const rect = document.querySelector(".container").getBoundingClientRect();
  return rect.left + rect.width / 2;
}
function move(e){
  if(!dragging) return;

  const p = e.touches ? e.touches[0] : e;
  const dx = p.clientX - startX;
  currentX = p.clientX;

  // 🔥 direction-based switching
  let newActive = null;
  
  if (dx < -15) newActive = "top";     // swipe left
  if (dx > 15) newActive = "bottom";  // swipe right

  // update active dynamically
  if(newActive && newActive !== active){
    active = newActive;
    setupDrag();
  }

  if(!active) return;

  // movement + rotation
  const rotation = dx * 0.05;
  drag.style.transform = `translateX(${dx}px) rotate(${rotation}deg)`;
}

// ===== END =====
window.addEventListener("mouseup", end);
window.addEventListener("touchend", end);
function next(){

  const i = Math.floor(Math.random() * pairs.length);

  topFace.querySelector("img").src = pairs[i][0];
  bottomFace.querySelector("img").src = pairs[i][1];
}
function end(){
  if(!dragging) return;
  dragging = false;

  const dx = currentX - startX;
  const threshold = 100;

  if(active && Math.abs(dx) > threshold){
    commit(dx < 0 ? -1 : 1);
  } else {
    reset();
  }
}
// ===== SETUP =====
function setupDrag(){
  const source = active === "top" ? topFace : bottomFace;

  drag.innerHTML = source.innerHTML;
  drag.style.top = active === "top" ? "0" : "50%";
  drag.style.left = "0";
}

// ===== COMMIT =====


// ===== RESET =====
function reset(){
  drag.style.transition = "transform 0.25s ease, opacity 0.25s";
  drag.style.transform = "translateX(0) rotate(0)";
  drag.style.opacity = "1";

  setTimeout(() => {
    drag.innerHTML = "";
    drag.style.transition = "none";
    active = null;
  }, 250);
}
function commit(direction){
  // shrink first
  drag.style.transition = "transform 0.12s ease";
  drag.style.transform += " scale(0.9)";

  setTimeout(() => {
    drag.style.transition = "transform 0.25s ease, opacity 0.25s";
    drag.style.transform =
      `translateX(${direction * 1000}px) rotate(${direction * 20}deg) scale(0.85)`;
    drag.style.opacity = "0";
  }, 80);

  if (navigator.vibrate) navigator.vibrate(10);

  console.log("VOTED:", active);

  // 🔥 load next BEFORE reset completes
  setTimeout(() => {
    next();
    reset();
  }, 250);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Swipe</title>

<style>
body {
  margin: 0;
  background: #0a0a0f;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* Faces */
.face {
  position: absolute;
  width: 100%;
  height: 50%;
  overflow: hidden;
}

.top { top: 0; }
.bottom { bottom: 0; }

.face img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}

/* Drag layer */
.drag {
  position: absolute;
  width: 100%;
  height: 50%;
  pointer-events: none;
  will-change: transform;
}
</style>
</head>

<body>

<div class="container">
  <div class="face top" id="topFace">
    <img src="https://picsum.photos/600/400?1">
  </div>

  <div class="face bottom" id="bottomFace">
    <img src="https://picsum.photos/600/400?2">
  </div>

  <div class="drag" id="drag"></div>
</div>

<script>
const drag = document.getElementById("drag");
const topFace = document.getElementById("topFace");
const bottomFace = document.getElementById("bottomFace");

let dragging = false;
let startX = 0;
let currentX = 0;
let active = null;

// ===== START =====
window.addEventListener("mousedown", start);
window.addEventListener("touchstart", start);

function start(e){
  const p = e.touches ? e.touches[0] : e;
  dragging = true;
  startX = currentX = p.clientX;
  active = null;
}

// ===== MOVE =====
window.addEventListener("mousemove", move);
window.addEventListener("touchmove", move);

function move(e){
  if(!dragging) return;

  const p = e.touches ? e.touches[0] : e;
  const dx = p.clientX - startX;
  currentX = p.clientX;

  // decide direction
  if(!active && Math.abs(dx) > 20){
    active = dx < 0 ? "top" : "bottom";
    setupDrag();
  }

  if(!active) return;

  // apply transform
  const rotation = dx * 0.05;
  drag.style.transform = `translateX(${dx}px) rotate(${rotation}deg)`;
}

// ===== END =====
window.addEventListener("mouseup", end);
window.addEventListener("touchend", end);

function end(){
  if(!dragging) return;
  dragging = false;

  const dx = currentX - startX;

  const threshold = 100;

  if(active && Math.abs(dx) > threshold){
    commit(dx);
  } else {
    reset();
  }
}

// ===== SETUP =====
function setupDrag(){
  const source = active === "top" ? topFace : bottomFace;

  drag.innerHTML = source.innerHTML;
  drag.style.top = active === "top" ? "0" : "50%";
  drag.style.left = "0";
}

// ===== COMMIT =====
function commit(dx){
  const direction = dx < 0 ? -1 : 1;

  drag.style.transition = "transform 0.25s ease, opacity 0.25s";
  drag.style.transform = `translateX(${direction * 1000}px) rotate(${direction * 20}deg)`;
  drag.style.opacity = "0";

  console.log("VOTED:", active);

  setTimeout(reset, 250);
}

// ===== RESET =====
function reset(){
  drag.style.transition = "transform 0.25s ease, opacity 0.25s";
  drag.style.transform = "translateX(0) rotate(0)";
  drag.style.opacity = "1";

  setTimeout(() => {
    drag.innerHTML = "";
    drag.style.transition = "none";
    active = null;
  }, 250);
}
</script>

</body>
</html>

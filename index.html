<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unfiltered Premium Swipe</title>

<style>
body {
  margin: 0;
  background: #0a0a0f;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: white;
}

.container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.face {
  position: absolute;
  width: 100%;
  height: 50%;
  overflow: hidden;
  transition: transform 0.25s cubic-bezier(.22,1,.36,1), opacity 0.25s;
  will-change: transform;
}

.top { top: 0; }
.bottom { bottom: 0; }

.face img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}

.name {
  position: absolute;
  bottom: 14px;
  left: 18px;
  font-size: 20px;
  font-weight: 600;
}

.prompt {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 100%;
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  background: linear-gradient(90deg, #8b5cff, #4da6ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.active {
  box-shadow: 0 0 60px rgba(139,92,255,0.8);
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">

  <div class="face top" id="topFace">
    <img id="topImg" src="https://picsum.photos/600/400?1">
    <div class="name" id="topName">Jake</div>
  </div>

  <div class="prompt">Most Likely To Survive Zombie Apocalypse</div>

  <div class="face bottom" id="bottomFace">
    <img id="bottomImg" src="https://picsum.photos/600/400?2">
    <div class="name" id="bottomName">Sam</div>
  </div>

</div>

<script>
const topFace = document.getElementById("topFace");
const bottomFace = document.getElementById("bottomFace");

let startX = 0, startY = 0;
let currentX = 0, currentY = 0;
let dragging = false;
let locked = null;
let velocityX = 0, velocityY = 0;
let lastTime = 0;

// ===== START =====
window.addEventListener("mousedown", start);
window.addEventListener("touchstart", start);

function start(e) {
  const p = e.touches ? e.touches[0] : e;
  startX = currentX = p.clientX;
  startY = currentY = p.clientY;
  dragging = true;
  locked = null;
  lastTime = performance.now();
}

// ===== MOVE =====
window.addEventListener("mousemove", move);
window.addEventListener("touchmove", move);

function move(e) {
  if (!dragging) return;

  const p = e.touches ? e.touches[0] : e;
  const now = performance.now();

  const dx = p.clientX - startX;
  const dy = p.clientY - startY;

  velocityX = (p.clientX - currentX) / (now - lastTime);
  velocityY = (p.clientY - currentY) / (now - lastTime);

  currentX = p.clientX;
  currentY = p.clientY;
  lastTime = now;

  const absX = Math.abs(dx);
  const absY = Math.abs(dy);

  // Lock decision
  if (!locked && (absX > 30 || absY > 30)) {
    if (dx < 0 || dy < 0) locked = "top";
    if (dx > 0 || dy > 0) locked = "bottom";
  }

  highlight(locked);

  // Subtle follow (not full drag)
  const resistanceX = dx * 0.2;
  const resistanceY = dy * 0.2;

  if (locked === "top") {
    topFace.style.transform = `translate(${resistanceX}px, ${resistanceY}px) scale(1.05)`;
  }

  if (locked === "bottom") {
    bottomFace.style.transform = `translate(${resistanceX}px, ${resistanceY}px) scale(1.05)`;
  }
}

// ===== END =====
window.addEventListener("mouseup", end);
window.addEventListener("touchend", end);

function end() {
  if (!dragging) return;
  dragging = false;

  const dx = currentX - startX;
  const dy = currentY - startY;

  const strong =
    Math.abs(dx) > 120 ||
    Math.abs(dy) > 120 ||
    Math.abs(velocityX) > 0.6 ||
    Math.abs(velocityY) > 0.6;

  if (!locked || !strong) {
    reset();
    return;
  }

  commit(locked, dx, dy);
}

// ===== COMMIT =====
function commit(target, dx, dy) {
  const el = target === "top" ? topFace : bottomFace;

  // Normalize direction
  const mag = Math.sqrt(dx*dx + dy*dy);
  const nx = dx / mag;
  const ny = dy / mag;

  // Launch far in swipe direction
  const distance = 1000;

  el.style.transform = `translate(${nx * distance}px, ${ny * distance}px) scale(1.1)`;
  el.style.opacity = "0";

  // 🔥 HAPTIC
  if (navigator.vibrate) navigator.vibrate(15);

  console.log("VOTED:", target);

  setTimeout(() => {
    reset();
    next();
  }, 250);
}

// ===== RESET =====
function reset() {
  [topFace, bottomFace].forEach(el => {
    el.style.transform = "translate(0,0) scale(1)";
    el.style.opacity = "1";
    el.classList.remove("active");
  });
}

// ===== HIGHLIGHT =====
function highlight(target) {
  topFace.classList.remove("active");
  bottomFace.classList.remove("active");

  if (target === "top") topFace.classList.add("active");
  if (target === "bottom") bottomFace.classList.add("active");
}

// ===== NEXT =====
function next() {
  const names = [["Alex","Chris"],["Jordan","Taylor"],["Ryan","Casey"]];
  const i = Math.floor(Math.random() * names.length);

  topName.innerText = names[i][0];
  bottomName.innerText = names[i][1];

  topImg.src = `https://picsum.photos/600/400?${Math.random()}`;
  bottomImg.src = `https://picsum.photos/600/400?${Math.random()}`;
}
</script>

</body>
</html>
